AWSTemplateFormatVersion: '2010-09-09'
Description: >
  mcropsey Lab - crAPI on EC2 via Docker Compose + ALB.
  VPC 10.2.0.0/16. Ports: 80 (web), 8080 (REST API), 8025 (MailHog).
  Use ALBRestAPIURL output as the upstream URL in Zuplo.
  Account: 491489166083  Region: us-east-2

Parameters:

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: mcropsey-key

  InstanceType:
    Type: String
    Default: t3.large
    AllowedValues: [t3.medium, t3.large, t3.xlarge, t3.2xlarge]
    Description: t3.large (2 vCPU / 8 GB) minimum recommended for crAPI

  AMIId:
    Type: AWS::EC2::Image::Id
    Default: ami-0f5b1543e7f934f48
    Description: Amazon Linux 2023 (al2023-ami-2023.11.20260514.0-kernel-6.18-x86_64)

  AllowedSSHCIDR:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR for SSH access. Restrict to your IP (e.g. 1.2.3.4/32).

Resources:

  # VPC

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.2.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - {Key: Name, Value: mcropsey-lab-vpc}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - {Key: Name, Value: mcropsey-lab-igw}

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Subnets - 2 public (ALB needs >=2 AZs), 2 private for future use

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.2.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: mcropsey-lab-public-1a}]

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.2.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: mcropsey-lab-public-1b}]

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.2.10.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags: [{Key: Name, Value: mcropsey-lab-private-1a}]

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.2.11.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags: [{Key: Name, Value: mcropsey-lab-private-1b}]

  # Routing

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{Key: Name, Value: mcropsey-lab-public-rt}]

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # Security Groups

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: mcropsey-lab-alb-sg
      GroupDescription: ALB inbound - HTTP 80 (web), 8080 (API), 8025 (MailHog)
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: crAPI web frontend
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: crAPI REST API - Zuplo upstream
        - IpProtocol: tcp
          FromPort: 8025
          ToPort: 8025
          CidrIp: 0.0.0.0/0
          Description: MailHog UI
      Tags: [{Key: Name, Value: mcropsey-lab-alb-sg}]

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: mcropsey-lab-ec2-sg
      GroupDescription: EC2 - SSH from allowed CIDR, app ports from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHCIDR
          Description: SSH
        - IpProtocol: tcp
          FromPort: 8888
          ToPort: 8888
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: crAPI web frontend from ALB
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: crAPI REST API from ALB
        - IpProtocol: tcp
          FromPort: 8025
          ToPort: 8025
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: MailHog from ALB
      Tags: [{Key: Name, Value: mcropsey-lab-ec2-sg}]

  # EC2 Instance

  CrAPIInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AMIId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euo pipefail
          exec > >(tee /var/log/user-data.log | logger -t user-data -s 2>/dev/console) 2>&1

          echo "==> System update"
          dnf update -y

          echo "==> Installing Docker + git"
          dnf install -y docker git
          systemctl enable --now docker
          usermod -aG docker ec2-user

          echo "==> Installing Docker Compose standalone binary"
          curl -fsSL \
            "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" \
            -o /usr/local/bin/docker-compose
          chmod +x /usr/local/bin/docker-compose
          docker-compose version

          echo "==> Setting up crAPI"
          mkdir -p /opt/crapi
          cd /opt/crapi

          curl -fsSL \
            https://raw.githubusercontent.com/OWASP/crAPI/main/deploy/docker/docker-compose.yml \
            -o docker-compose.yml

          curl -fsSL \
            https://raw.githubusercontent.com/OWASP/crAPI/main/deploy/docker/.env \
            -o .env

          # Set LISTEN_IP to 0.0.0.0 so the ALB can reach crAPI (default is 127.0.0.1)
          sed -i 's/LISTEN_IP=.*/LISTEN_IP=0.0.0.0/' .env

          echo "==> Pulling images (takes a few minutes)"
          docker-compose pull --quiet

          echo "==> Starting crAPI"
          docker-compose up -d

          echo "==> crAPI bootstrap complete at $(date)"
      Tags:
        - {Key: Name, Value: mcropsey-lab-instance}

  # Application Load Balancer

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: mcropsey-lab-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags: [{Key: Name, Value: mcropsey-lab-alb}]

  # Target Groups

  TGWeb:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: mcropsey-web-tg
      Protocol: HTTP
      Port: 8888
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckPath: /
      HealthCheckPort: "8888"
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: 200-399
      Targets:
        - Id: !Ref CrAPIInstance
          Port: 8888

  TGAPI:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: mcropsey-api-tg
      Protocol: HTTP
      Port: 8080
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckPath: /
      HealthCheckPort: "8080"
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: 200-404
      Targets:
        - Id: !Ref CrAPIInstance
          Port: 8080

  TGMailHog:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: mcropsey-mailhog-tg
      Protocol: HTTP
      Port: 8025
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckPath: /
      HealthCheckPort: "8025"
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: 200-399
      Targets:
        - Id: !Ref CrAPIInstance
          Port: 8025

  # Listeners

  ListenerWeb:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TGWeb

  ListenerAPI:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 8080
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TGAPI

  ListenerMailHog:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 8025
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TGMailHog

Outputs:

  VPCId:
    Description: VPC ID
    Value: !Ref VPC

  PublicSubnet1Id:
    Description: Public subnet 1 (us-east-2a) - crAPI instance lives here
    Value: !Ref PublicSubnet1

  ALBDNSName:
    Description: Raw ALB DNS name
    Value: !GetAtt ALB.DNSName

  CrAPIWebURL:
    Description: crAPI web UI (open in browser after ~2 min)
    Value: !Sub "http://${ALB.DNSName}"

  ALBRestAPIURL:
    Description: crAPI REST API via ALB - use this as the upstream URL in Zuplo
    Value: !Sub "http://${ALB.DNSName}:8080"

  MailHogURL:
    Description: MailHog email-capture UI
    Value: !Sub "http://${ALB.DNSName}:8025"

  SSHCommand:
    Description: SSH to the crAPI instance
    Value: !Sub "ssh -i ~/.ssh/mcropsey-key.pem ec2-user@${CrAPIInstance.PublicIp}"

  DockerLogsCommand:
    Description: Watch crAPI container logs after SSH
    Value: "cd /opt/crapi && docker compose logs -f"
